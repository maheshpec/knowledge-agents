# Evaluation configuration (SPEC §9). Phase 2H implements datasets, metrics, runners.
# Paths are repo-root-relative. The current splits are the committed seed sets
# (~50 queries over the fixture corpus, generated by scripts/gen_seed_dataset.py);
# the production-scale sizes below are the SPEC §9.1 targets for real corpora.

datasets:
  corpus: evaluation/datasets/seed/corpus   # fixture corpus ingested for offline eval
  dev:
    path: evaluation/datasets/seed/dev.jsonl
    size: 500          # target: seen freely by the self-improvement loop
  rotating:
    path: evaluation/datasets/seed/rotating.jsonl
    size: 500          # target: shown only at generation boundaries
  frozen:
    path: evaluation/datasets/seed/frozen.jsonl
    size: 1000         # target: NEVER shown to the loop; final verification only

metrics:
  retrieval: [recall@5, recall@10, recall@20, precision@10, ndcg@10, mrr, hit_rate]
  end_to_end: [faithfulness, answer_relevance, citation_precision, citation_recall]
  operational: [latency_p50, latency_p95, cost_per_query, token_efficiency]

runner:
  log_to_langsmith: true
  concurrency: 8
