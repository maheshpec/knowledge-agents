# Component registry (SPEC §8.1) — the bounded search space for the
# self-improvement loop. The ONLY place the evolutionary loop may pull
# components from; new techniques enter via human PRs to this file.
#
# Phase 1A ships the registry skeleton matching SPEC §8.1. Component classes are
# wired up as later phases implement them.

chunkers:
  - name: recursive
    class: knowledge_index.chunking.RecursiveChunker
    params:
      chunk_size: {type: int, range: [200, 1500], default: 500}
      chunk_overlap: {type: int, range: [0, 200], default: 75}
  - name: semantic
    class: knowledge_index.chunking.SemanticChunker
    params:
      threshold: {type: float, range: [0.5, 0.95], default: 0.75}
      breakpoint_type:
        {type: enum, values: [percentile, standard_deviation, interquartile, gradient], default: percentile}
  - name: sentence_window
    class: knowledge_index.chunking.SentenceWindowChunker
    params:
      window_size: {type: int, range: [0, 5], default: 1}
  - name: late_chunking
    class: knowledge_index.chunking.LateChunkingChunker
    params:
      pool_method: {type: enum, values: [mean, max], default: mean}
      sentences_per_chunk: {type: int, range: [1, 10], default: 3}
  - name: propositional
    class: knowledge_index.chunking.PropositionalChunker
    params:
      model: {type: enum, values: [haiku, sonnet], default: haiku}

enrichers:
  - name: "null"
  - name: contextual
    params:
      max_context_tokens: {type: int, range: [30, 150], default: 80}
  - name: title
  - name: summary

retrievers:
  - name: dense
  - name: sparse_bm25
  - name: hybrid_rrf
    params:
      rrf_k: {type: int, range: [10, 200], default: 60}

rerankers:
  - name: "null"
  - name: cohere_rerank_3
  - name: voyage_rerank_2
  - name: llm_rerank
    params:
      model: {type: enum, values: [haiku, sonnet], default: haiku}

post_processors:
  - name: mmr
    params:
      lambda: {type: float, range: [0.0, 1.0], default: 0.5}
  - name: parent_expander
  - name: span_extractor
    params:
      max_sentences: {type: int, range: [1, 8], default: 3}
  - name: lost_in_the_middle
  - name: deduplicator

query_ops:
  - name: rewrite
  - name: hyde
  - name: decompose
  - name: stepback
